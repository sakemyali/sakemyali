<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <style>
    @keyframes movePacman {
      0% { transform: translateX(-40px); }
      100% { transform: translateX(810px); }
    }
    @keyframes chomp {
      0% { d: path("M 0,-20 A 20,20 0 1,1 0,20 L 0,0 Z"); }
      50% { d: path("M 18,-8 A 20,20 0 1,1 18,8 L 0,0 Z"); }
      100% { d: path("M 0,-20 A 20,20 0 1,1 0,20 L 0,0 Z"); }
    }
    @keyframes mouthTop {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-35deg); }
    }
    @keyframes mouthBottom {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(35deg); }
    }
    @keyframes moveGhost1 {
      0% { transform: translateX(-100px); }
      100% { transform: translateX(810px); }
    }
    @keyframes moveGhost2 {
      0% { transform: translateX(-140px); }
      100% { transform: translateX(810px); }
    }
    @keyframes moveGhost3 {
      0% { transform: translateX(-180px); }
      100% { transform: translateX(810px); }
    }
    @keyframes moveGhost4 {
      0% { transform: translateX(-220px); }
      100% { transform: translateX(810px); }
    }
    @keyframes wobble {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes dotFade {
      0%, 60% { opacity: 1; }
      70% { opacity: 0; }
      100% { opacity: 0; }
    }
    .pacman-group {
      animation: movePacman 6s linear infinite;
    }
    .ghost1 { animation: moveGhost1 6s linear infinite; }
    .ghost2 { animation: moveGhost2 6s linear infinite; }
    .ghost3 { animation: moveGhost3 6s linear infinite; }
    .ghost4 { animation: moveGhost4 6s linear infinite; }
    .ghost-body { animation: wobble 0.3s ease-in-out infinite; }
    .dot { animation: dotFade 6s linear infinite; }
  </style>

  <rect width="800" height="120" fill="#0d1117" rx="10"/>

  <!-- Dots -->
  <g>
    <circle class="dot" cx="60" cy="60" r="4" fill="#FFD700" style="animation-delay: -5.55s"/>
    <circle class="dot" cx="100" cy="60" r="4" fill="#FFD700" style="animation-delay: -5.25s"/>
    <circle class="dot" cx="140" cy="60" r="4" fill="#FFD700" style="animation-delay: -4.95s"/>
    <circle class="dot" cx="180" cy="60" r="4" fill="#FFD700" style="animation-delay: -4.65s"/>
    <circle class="dot" cx="220" cy="60" r="8" fill="#FFD700" style="animation-delay: -4.35s"/>
    <circle class="dot" cx="260" cy="60" r="4" fill="#FFD700" style="animation-delay: -4.05s"/>
    <circle class="dot" cx="300" cy="60" r="4" fill="#FFD700" style="animation-delay: -3.75s"/>
    <circle class="dot" cx="340" cy="60" r="4" fill="#FFD700" style="animation-delay: -3.45s"/>
    <circle class="dot" cx="380" cy="60" r="4" fill="#FFD700" style="animation-delay: -3.15s"/>
    <circle class="dot" cx="420" cy="60" r="8" fill="#FFD700" style="animation-delay: -2.85s"/>
    <circle class="dot" cx="460" cy="60" r="4" fill="#FFD700" style="animation-delay: -2.55s"/>
    <circle class="dot" cx="500" cy="60" r="4" fill="#FFD700" style="animation-delay: -2.25s"/>
    <circle class="dot" cx="540" cy="60" r="4" fill="#FFD700" style="animation-delay: -1.95s"/>
    <circle class="dot" cx="580" cy="60" r="4" fill="#FFD700" style="animation-delay: -1.65s"/>
    <circle class="dot" cx="620" cy="60" r="8" fill="#FFD700" style="animation-delay: -1.35s"/>
    <circle class="dot" cx="660" cy="60" r="4" fill="#FFD700" style="animation-delay: -1.05s"/>
    <circle class="dot" cx="700" cy="60" r="4" fill="#FFD700" style="animation-delay: -0.75s"/>
    <circle class="dot" cx="740" cy="60" r="4" fill="#FFD700" style="animation-delay: -0.45s"/>
  </g>

  <!-- Pacman -->
  <g class="pacman-group">
    <!-- Body -->
    <circle cx="0" cy="60" r="20" fill="#FFE000"/>
    <!-- Mouth top (rotating wedge) -->
    <g transform="translate(0,60)" style="transform-origin: 0px 0px;">
      <rect class="mouth-piece" x="-2" y="-20" width="24" height="20" fill="#0d1117">
        <animateTransform attributeName="transform" type="rotate" values="0,0,0;-35,0,0;0,0,0" dur="0.25s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- Mouth bottom (rotating wedge) -->
    <g transform="translate(0,60)" style="transform-origin: 0px 0px;">
      <rect class="mouth-piece" x="-2" y="0" width="24" height="20" fill="#0d1117">
        <animateTransform attributeName="transform" type="rotate" values="0,0,0;35,0,0;0,0,0" dur="0.25s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- Eye -->
    <circle cx="-3" cy="47" r="3.5" fill="#0d1117"/>
  </g>

  <!-- Ghost: Blinky (Red) -->
  <g class="ghost1">
    <g class="ghost-body">
      <path d="M-16,75 L-16,50 Q-16,35 0,35 Q16,35 16,50 L16,75 L11,68 L5,75 L0,68 L-5,75 L-11,68 Z" fill="#FF0000"/>
      <circle cx="-5" cy="50" r="4" fill="white"/>
      <circle cx="7" cy="50" r="4" fill="white"/>
      <circle cx="-3" cy="50" r="2.5" fill="#1a1aff"/>
      <circle cx="9" cy="50" r="2.5" fill="#1a1aff"/>
    </g>
  </g>

  <!-- Ghost: Pinky (Pink) -->
  <g class="ghost2">
    <g class="ghost-body" style="animation-delay: 0.1s">
      <path d="M-16,75 L-16,50 Q-16,35 0,35 Q16,35 16,50 L16,75 L11,68 L5,75 L0,68 L-5,75 L-11,68 Z" fill="#FFB8FF"/>
      <circle cx="-5" cy="50" r="4" fill="white"/>
      <circle cx="7" cy="50" r="4" fill="white"/>
      <circle cx="-3" cy="50" r="2.5" fill="#1a1aff"/>
      <circle cx="9" cy="50" r="2.5" fill="#1a1aff"/>
    </g>
  </g>

  <!-- Ghost: Inky (Cyan) -->
  <g class="ghost3">
    <g class="ghost-body" style="animation-delay: 0.2s">
      <path d="M-16,75 L-16,50 Q-16,35 0,35 Q16,35 16,50 L16,75 L11,68 L5,75 L0,68 L-5,75 L-11,68 Z" fill="#00FFFF"/>
      <circle cx="-5" cy="50" r="4" fill="white"/>
      <circle cx="7" cy="50" r="4" fill="white"/>
      <circle cx="-3" cy="50" r="2.5" fill="#1a1aff"/>
      <circle cx="9" cy="50" r="2.5" fill="#1a1aff"/>
    </g>
  </g>

  <!-- Ghost: Clyde (Orange) -->
  <g class="ghost4">
    <g class="ghost-body" style="animation-delay: 0.3s">
      <path d="M-16,75 L-16,50 Q-16,35 0,35 Q16,35 16,50 L16,75 L11,68 L5,75 L0,68 L-5,75 L-11,68 Z" fill="#FFB852"/>
      <circle cx="-5" cy="50" r="4" fill="white"/>
      <circle cx="7" cy="50" r="4" fill="white"/>
      <circle cx="-3" cy="50" r="2.5" fill="#1a1aff"/>
      <circle cx="9" cy="50" r="2.5" fill="#1a1aff"/>
    </g>
  </g>

  <!-- Score text -->
  <text x="20" y="105" fill="#FFD700" font-family="monospace" font-size="12" font-weight="bold">SCORE: 1337</text>
  <text x="650" y="105" fill="#FFD700" font-family="monospace" font-size="12" font-weight="bold">HIGH SCORE: 9999</text>
</svg>
